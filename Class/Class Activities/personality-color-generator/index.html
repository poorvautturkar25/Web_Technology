<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Personality Color Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎨 Personality Based Color Generator</h1>

<div class="container">

    <label>Mood:</label>
    <select id="mood">
        <option value="">Select</option>
        <option>Calm</option>
        <option>Happy</option>
        <option>Focused</option>
        <option>Adventurous</option>
    </select>

    <br><br>

    <label>Energy Level:</label>
    <select id="energy">
        <option value="">Select</option>
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
    </select>

    <br><br>

    <label>Style:</label>
    <select id="style">
        <option value="">Select</option>
        <option>Creative</option>
        <option>Simple</option>
        <option>Bold</option>
    </select>

    <br><br>

    <button id="generateBtn">Generate My Color</button>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
